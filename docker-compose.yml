version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: policy-renewal-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/policy_renewal.db
      - CHROMA_PERSIST_DIR=./data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: policy-renewal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
